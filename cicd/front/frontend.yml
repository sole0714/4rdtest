apiVersion: apps/v1
kind: Deployment
metadata:
  name: board-front-deployment
  namespace: lhb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: board-front
  template:
    metadata:
      labels:
        app: board-front
    spec:
      containers:
        - name: board-front
          image: sole07/board-front:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: board-front-service
  namespace: lhb
spec:
  type: LoadBalancer
  selector:
    app: board-front
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80