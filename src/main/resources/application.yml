spring:
  datasource:
    url: jdbc:mariadb://mariadb-service:3306/boarddb
    username: root
    password: '1234'
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MariaDBDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

app:
  cors:
    allowed-origins:
      - "http://localhost:5173"
      - "http://your-k8s-frontend-service"